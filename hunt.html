<!index.html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bounty Hunt - AR Scanner</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
      }
      #ar-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.9);
        color: #00ff00;
        font-family: "Courier New", Courier, monospace;
        z-index: 10;
        text-align: center;
      }

      button {
        padding: 20px 40px;
        font-size: 20px;
        background: transparent;
        color: #00ff00;
        border: 2px solid #00ff00;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: 0 0 10px #00ff00;
      }

      button:active {
        background: #00ff00;
        color: black;
      }

      #status {
        margin-top: 20px;
        font-size: 14px;
        color: #aaa;
      }
    </style>
  </head>

  <body>
    <div id="ui-layer">
      <h1>BOUNTY SYSTEM ONLINE</h1>
      <button id="startButton">INITIALIZE SCANNER</button>
      <div id="status">Waiting for user input...</div>
    </div>

    <div id="ar-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r123/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

    <script>
      const startButton = document.querySelector("#startButton");
      const statusText = document.querySelector("#status");
      const uiLayer = document.querySelector("#ui-layer");

      startButton.addEventListener("click", async () => {
        statusText.innerText = "Requesting Camera Access...";

        try {
          const mindarThree = new window.MINDAR.IMAGE.MindARThree({
            container: document.querySelector("#ar-container"),
            // Ensure this path is correct relative to your hunt.html
            imageTargetSrc: "./markers/targets.mind",
          });

          const { renderer, scene, camera } = mindarThree;

          // Add lighting
          const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
          scene.add(light);

          // Add content to the first target (index 0)
          const anchor = mindarThree.addAnchor(0);
          const geometry = new THREE.PlaneGeometry(1, 1);
          const material = new THREE.MeshBasicMaterial({
            color: 0x00ff00,
            transparent: true,
            opacity: 0.5,
            side: THREE.DoubleSide,
          });
          const plane = new THREE.Mesh(geometry, material);
          anchor.group.add(plane);

          // Start MindAR
          await mindarThree.start();

          // If start() succeeds, hide the UI
          uiLayer.style.display = "none";

          renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
          });
        } catch (error) {
          console.error("AR Initialization Error:", error);
          statusText.style.color = "red";
          statusText.innerText = "ERROR: " + error.message;
        }
      });
    </script>
  </body>
</html>
