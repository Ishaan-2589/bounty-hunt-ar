<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RECONNAISSANCE UNIT</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="js/riddles.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: monospace;
      }

      #card {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #001100;
        border: 2px solid #00ff00;
        padding: 20px;
        color: #00ff00;
        z-index: 10000;
        text-align: center;
        width: 85%;
        max-width: 380px;
      }

      input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        background: #000;
        border: 1px solid #00ff00;
        color: #00ff00;
        text-align: center;
      }

      button {
        width: 95%;
        padding: 12px;
        background: #00ff00;
        border: none;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="card"></div>

    <script>
      const selectedRoute = localStorage.getItem("bounty_route") || "A";
      let currentStep = parseInt(localStorage.getItem("bounty_step")) || 0;

      if (currentStep >= 6) {
        window.location.href = "final.html";
      }

      const currentNodeKey = routeSteps[selectedRoute][currentStep];

      document.write(`

<a-scene
mindar-image="imageTargetSrc: markers/${currentNodeKey}.mind; autoStart:true; uiScanning:yes;"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
>

<a-camera position="0 0 0"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex:0"></a-entity>

</a-scene>

`);

      document.addEventListener("DOMContentLoaded", () => {
        const anchor = document.querySelector("#target");

        anchor.addEventListener("targetFound", () => {
          const card = document.getElementById("card");
          card.style.display = "block";

          if (currentStep < 5) {
            const nextNodeKey = routeSteps[selectedRoute][currentStep + 1];
            const textKey = "Route " + selectedRoute;

            let displayRiddle = "RIDDLE ERROR";

            if (riddles[nextNodeKey]) {
              if (riddles[nextNodeKey][textKey]) {
                displayRiddle = riddles[nextNodeKey][textKey];
              } else if (riddles[nextNodeKey]["ALL_ROUTES"]) {
                displayRiddle = riddles[nextNodeKey]["ALL_ROUTES"];
              }
            }

            // ... script ke andar jahan displayRiddle generate ho raha hai ...

            card.innerHTML = `
<div style="text-align: left; margin-bottom: 5px; border-bottom: 1px solid #00ff00; padding-bottom: 3px;">
    <span style="font-size: 0.65rem; color: #88ff88;">[ SYSTEM: DATA_STREAM ]</span>
</div>

<div style="
    width: 90%;
    max-width: 300px;
    min-height: 110px; /* Box ka size chhota kar diya */
    margin: 0 auto 12px auto;
    display: flex;
    flex-direction: column;
    justify-content: center; /* Vertically center */
    align-items: center;    /* Horizontally center */
    background: rgba(0, 40, 0, 0.2);
    box-sizing: border-box;
">
    <p style="font-size: 0.75rem; color: #00ff00; margin: 0 0 8px 0; width: 100%; text-align: left; font-weight: bold;">
        > MISSION_LOG:
    </p>
    
    <div id="riddle-text" style="
        white-space: pre-wrap; 
        overflow-wrap: break-word; 
        word-break:normal; 
        font-size: 0.9rem; 
        line-height: 1.6;
        color: #ffffff;
        text-align: center; 
        width: 100%;
        padding: 0 5px;
    ">
        ${displayRiddle}
    </div>
</div>

<input id="answer" placeholder="ENTER ACCESS KEY" style="
    width: 100%; 
    padding: 10px; 
    background: #000; 
    border: 1px solid #00ff00; 
    color: #00ff00; 
    margin-bottom: 10px;
    text-align: center;
    box-sizing: border-box;
    font-size: 0.9rem;
">

<button onclick="checkAnswer('${nextNodeKey}')" style="
    width: 100%; 
    padding: 12px; 
    background: #00ff00; 
    color: #000; 
    font-weight: bold;
    text-transform: uppercase;
    box-sizing: border-box;
">SUBMIT DATA</button>
`;
          } else {
            card.innerHTML = `
<div class="terminal">
  <p class="terminal-line">[ SYSTEM BREACH DETECTED ]</p>
  <p class="terminal-line">Decrypting final node...</p>

  <div class="loading-bar-container">
    <div class="loading-bar-fill"></div>
  </div>

  <p class="terminal-line glitch">ROGUE AI CORE DESTABILIZING...</p>

  <h2 class="victory">KEY 03 ACQUIRED</h2>
  <h1 class="key">DOMINANCE</h1>
</div>
`;

            setTimeout(() => {
              localStorage.setItem("bounty_step", 6);
              window.location.href = "final.html";
            }, 5000);
          }
        });
      });

      function checkAnswer(node) {
        const val = document
          .getElementById("answer")
          .value.trim()
          .toUpperCase();

        // Is line se hum check karenge ki user ka input list mein hai ya nahi
        const possibleAnswers = riddleAnswers[node];

        if (possibleAnswers.includes(val)) {
          currentStep++;
          localStorage.setItem("bounty_step", currentStep);
          location.reload();
        } else {
          alert("ACCESS DENIED: INVALID KEYCODE");
        }
      }
    </script>
  </body>
</html>
