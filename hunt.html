<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZERO HOUR - Scanner</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r123/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
  </head>
  <body>
    <div id="progress-container">
      <div id="progress-bar"></div>
      <div id="progress-text">NODE 1/6</div>
    </div>

    <div id="overlay-container">
     <div id="intercept-anim" class="hidden">
    <div class="scanning-line"></div>
    <div class="glitch-text">⚠ SIGNAL INTERCEPTED</div>
        <p>Decrypting transmission...</p>
      </div>
</div>
      <div id="riddle-card" class="hidden">
        <h2 id="riddle-title">DATA DECRYPTED</h2>
        <p id="riddle-text"></p>
        <input
          type="text"
          id="node-unlock-code"
          placeholder="ENTER NODE CODE"
        />
        <button onclick="unlockNextNode()">SUBMIT AUTH</button>
      </div>
    </div>

    <div id="ar-container"></div>

    <script src="js/riddles.js"></script>
    <script>
      let currentStep = parseInt(localStorage.getItem("bounty_step")) || 0;
      const selectedRoute = localStorage.getItem("bounty_route") || "Route A";

      // Setup MindAR
      const startScanner = async () => {
        const mindarThree = new window.MINDAR.IMAGE.MindARThree({
          container: document.querySelector("#ar-container"),
          imageTargetSrc: "./markers/targets.mind",
        });
        const { renderer, scene, camera } = mindarThree;

        // Anchor for Target Detection
        const anchor = mindarThree.addAnchor(0);
        anchor.onTargetFound = () => {
          showIntercept();
        };

        await mindarThree.start();
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
        });
      };

      function showIntercept() {
        document.getElementById("intercept-anim").classList.remove("hidden");
        setTimeout(() => {
          document.getElementById("intercept-anim").classList.add("hidden");
          showRiddle();
        }, 3000); // 3-second animation
      }

      function showRiddle() {
        const nodeKey = routeSteps[selectedRoute][currentStep];
        document.getElementById("riddle-text").innerText =
          riddles[nodeKey][selectedRoute];
        document.getElementById("riddle-card").classList.remove("hidden");
      }

      function unlockNextNode() {
        const input = document
          .getElementById("node-unlock-code")
          .value.toUpperCase();
        const currentNodeKey = routeSteps[selectedRoute][currentStep];

        if (input === nodeCodes[currentNodeKey]) {
          currentStep++;
          localStorage.setItem("bounty_step", currentStep);
          if (currentStep >= 6) {
            window.location.href = "final.html";
          } else {
            location.reload(); // Reset for next marker
          }
        } else {
          alert("ACCESS DENIED: INVALID CODE");
        }
      }

      // Update Progress Bar on Load
      window.onload = () => {
        const progress = (currentStep / 6) * 100;
        document.getElementById("progress-bar").style.width = progress + "%";
        document.getElementById("progress-text").innerText =
          `NODE ${currentStep + 1}/6`;
        startScanner();
      };
    </script>
  </body>
</html>
