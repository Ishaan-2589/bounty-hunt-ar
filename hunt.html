<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZERO HOUR - Scanner</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      :root {
        --glow-cyan: #00e5ff;
        --dark-bg: rgba(0, 15, 20, 0.95);
        --text-main: #e0f7fa;
      }

      #progress-container {
        border: 1px solid var(--glow-cyan) !important;
        box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
      }

      #progress-bar {
        background: var(--glow-cyan) !important;
      }

      #riddle-card {
        border-left: 5px solid var(--glow-cyan) !important;
        background: linear-gradient(
          to right,
          rgba(0, 40, 50, 0.95),
          rgba(0, 0, 0, 0.95)
        ) !important;
        color: var(--text-main) !important;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.3) !important;
      }

      #riddle-title {
        color: var(--glow-cyan);
        text-shadow: 0 0 10px var(--glow-cyan);
      }

      button {
        background: var(--glow-cyan) !important;
        color: #000 !important;
        box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
      }

      input {
        border: 1px solid var(--glow-cyan) !important;
        color: var(--glow-cyan) !important;
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r123/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
  </head>
  <body>
    <div class="scanline"></div>

    <div id="progress-container">
      <div id="progress-bar"></div>
      <div id="progress-text">NODE 1/6</div>
    </div>

    <div id="overlay-container">
      <div id="intercept-anim" class="hidden">
        <div class="scanning-line"></div>
        <div class="glitch-text">⚠ SIGNAL INTERCEPTED</div>
        <p>DECRYPTING ROGUE AI DATA...</p>
      </div>

      <div id="riddle-card" class="hidden">
        <div class="header-box">
          <h2 id="riddle-title">DATA DECRYPTED</h2>
        </div>
        <p id="riddle-text">SCANNING FOR TRANSMISSION...</p>

        <div class="input-group">
          <input
            type="text"
            id="node-unlock-code"
            placeholder="ENTER DECRYPTION KEY"
            onclick="this.focus()"
            ontouchstart="this.focus();"
          />
          <p style="font-size: 0.5rem; color: #88ff88; margin-top: 5px">
            TAP BOX ABOVE TO ACTIVATE KEYBOARD
          </p>
        </div>
        <button onclick="unlockNextNode()">SUBMIT AUTH</button>
      </div>
    </div>

    <div id="ar-container"></div>

    <script src="js/riddles.js"></script>
    <script>
      let currentStep = parseInt(localStorage.getItem("bounty_step")) || 0;
      const selectedRoute = localStorage.getItem("bounty_route") || "Route A";

      const startScanner = async () => {
        const mindarThree = new window.MINDAR.IMAGE.MindARThree({
          container: document.querySelector("#ar-container"),
          imageTargetSrc: "./markers/targets.mind",
        });

        const { renderer, scene, camera } = mindarThree;

        // The mapping of your 10 physical locations to their marker index
        const markerIndexMap = {
          A: 0,
          B: 1,
          C: 2,
          D: 3,
          E: 4,
          G: 5,
          H: 6,
          I: 7,
          J: 8,
          F: 9,
        };

        // Calculate which specific marker this team needs right now
        const nodeKey = routeSteps[selectedRoute][currentStep];
        const targetIndex = markerIndexMap[nodeKey];

        // Tell the camera to ONLY search for that specific marker
        const anchor = mindarThree.addAnchor(0);

        anchor.onTargetFound = () => {
          if (
            document.getElementById("riddle-card").classList.contains("hidden")
          ) {
            showIntercept();
          }
        };

        await mindarThree.start();
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
        });
      };

      function showIntercept() {
        const intercept = document.getElementById("intercept-anim");
        intercept.classList.remove("hidden");

        setTimeout(() => {
          intercept.classList.add("hidden");
          showRiddle();
        }, 3000);
      }

      function showRiddle() {
        const nodeKey = routeSteps[selectedRoute][currentStep];
        const riddleContent = riddles[nodeKey][selectedRoute];

        const inputField = document.getElementById("node-unlock-code");
        document.getElementById("riddle-text").innerText = riddleContent;
        document.getElementById("riddle-card").classList.remove("hidden");

        // Force Open Keyboard attempt after 500ms to let the UI settle
        setTimeout(() => {
          inputField.focus();
          inputField.click(); // Some browsers require a click event to trigger the keyboard
        }, 500);
      }

      function unlockNextNode() {
        const userInput = document
          .getElementById("node-unlock-code")
          .value.trim()
          .toUpperCase();
        const currentNodeKey = routeSteps[selectedRoute][currentStep];
        const correctAnswer = riddleAnswers[currentNodeKey];

        if (userInput === correctAnswer) {
          currentStep++;
          localStorage.setItem("bounty_step", currentStep);

          if (currentStep >= 6) {
            window.location.href = "final.html";
          } else {
            location.reload();
          }
        } else {
          alert("ACCESS DENIED: KEY INCORRECT");
          document.getElementById("node-unlock-code").value = "";
        }
      }

      window.onload = () => {
        // Update UI Progress
        const progress = (currentStep / 6) * 100;
        document.getElementById("progress-bar").style.width = progress + "%";
        document.getElementById("progress-text").innerText =
          `NODE ${currentStep + 1}/6`;

        startScanner();
      };
    </script>
  </body>
</html>
