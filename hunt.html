<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RECONNAISSANCE UNIT</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="js/riddles.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
      }
      #riddle-card {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        background: rgba(0, 20, 0, 0.95);
        border: 2px solid #00ff00;
        padding: 20px;
        text-align: center;
        width: 85%;
        max-width: 400px;
        box-shadow: 0 0 20px #00ff00;
        color: #00ff00;
        font-family: monospace;
      }
      .loading-bar-container {
        width: 100%;
        background: #003300;
        height: 10px;
        margin: 15px 0;
      }
      .loading-bar-fill {
        width: 0%;
        height: 100%;
        background: #00ff00;
        animation: fillBar 1.2s forwards;
      }
      @keyframes fillBar {
        to {
          width: 100%;
        }
      }
      input {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
        background: #000;
        border: 1px solid #00ff00;
        color: #00ff00;
        text-align: center;
      }
      button {
        width: 90%;
        padding: 12px;
        background: #00ff00;
        color: #000;
        font-weight: bold;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="riddle-card"></div>

    <a-scene
      mindar-image="imageTargetSrc: markers/targets.mind?v=5; autoStart: true; uiLoading: yes; uiScanning: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="anchor0" mindar-image-target="targetIndex: 0"></a-entity>
      <a-entity id="anchor1" mindar-image-target="targetIndex: 1"></a-entity>
      <a-entity id="anchor2" mindar-image-target="targetIndex: 2"></a-entity>
      <a-entity id="anchor3" mindar-image-target="targetIndex: 3"></a-entity>
      <a-entity id="anchor4" mindar-image-target="targetIndex: 4"></a-entity>
      <a-entity id="anchor5" mindar-image-target="targetIndex: 5"></a-entity>
      <a-entity id="anchor6" mindar-image-target="targetIndex: 6"></a-entity>
      <a-entity id="anchor7" mindar-image-target="targetIndex: 7"></a-entity>
      <a-entity id="anchor8" mindar-image-target="targetIndex: 8"></a-entity>
      <a-entity id="anchor9" mindar-image-target="targetIndex: 9"></a-entity>
    </a-scene>

    <script>
      const selectedRoute = localStorage.getItem("bounty_route") || "A";
      let currentStep = parseInt(localStorage.getItem("bounty_step")) || 0;
      const markerIndexMap = {
        A: 0,
        B: 1,
        C: 2,
        D: 3,
        E: 4,
        G: 5,
        H: 6,
        I: 7,
        J: 8,
        F: 9,
      };

      if (currentStep >= 6) window.location.href = "final.html";

      document.addEventListener("DOMContentLoaded", () => {
        const currentNodeKey = routeSteps[selectedRoute][currentStep];
        const targetIndex = markerIndexMap[currentNodeKey];
        const activeAnchor = document.querySelector(`#anchor${targetIndex}`);

        activeAnchor.addEventListener("targetFound", () => {
          const card = document.getElementById("riddle-card");
          card.style.display = "block";

          card.innerHTML = `
                    <h3>TARGET DETECTED</h3>
                    <p>SCANNING NODE...</p>
                    <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
                    <p>DECRYPTING DATA STREAM...</p>
                `;

          setTimeout(() => {
            if (currentStep < 5) {
              const nextNodeKey = routeSteps[selectedRoute][currentStep + 1];
              const textKey = "Route " + selectedRoute;
              const displayRiddle =
                riddles[nextNodeKey] && riddles[nextNodeKey][textKey]
                  ? riddles[nextNodeKey][textKey]
                  : riddles[nextNodeKey]["ALL_ROUTES"];

              card.innerHTML = `
                            <p id="riddle-text">${displayRiddle}</p>
                            <input type="text" id="node-unlock-code" placeholder="ENTER ACCESS KEY">
                            <button id="submit-btn">SUBMIT DATA</button>
                        `;

              document.getElementById("submit-btn").onclick = () => {
                const userInput = document
                  .getElementById("node-unlock-code")
                  .value.trim()
                  .toUpperCase();
                if (userInput === riddleAnswers[nextNodeKey]) {
                  currentStep++;
                  localStorage.setItem("bounty_step", currentStep);
                  location.reload();
                } else {
                  alert("ACCESS DENIED: KEY INCORRECT");
                }
              };
            } else {
              card.innerHTML = `<h2>CORE SECURITY COLLAPSED</h2><h1>KEY 03: DOMINANCE</h1>`;
              setTimeout(() => {
                localStorage.setItem("bounty_step", 6);
                window.location.href = "final.html";
              }, 3500);
            }
          }, 1500);
        });
      });
    </script>
  </body>
</html>
