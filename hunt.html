<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RECONNAISSANCE UNIT</title>

    <link rel="stylesheet" href="css/style.css" />
    <script src="js/riddles.js"></script>

    <script
      async
      src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/",
          "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
        }
      }
    </script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
      }
      #ar-container {
        width: 100vw;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="ar-container"></div>

    <div
      id="riddle-card"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        background: rgba(0, 20, 0, 0.95);
        border: 2px solid #00ff00;
        padding: 20px;
        text-align: center;
        width: 85%;
        max-width: 400px;
        box-shadow: 0 0 20px #00ff00;
      "
    >
      <p
        id="riddle-text"
        style="
          color: #00ff00;
          font-family: monospace;
          font-size: 1.1rem;
          margin-bottom: 20px;
        "
      >
        [DATA ENCRYPTED]
      </p>
      <input
        type="text"
        id="node-unlock-code"
        placeholder="ENTER ACCESS KEY"
        style="
          width: 90%;
          padding: 12px;
          margin-bottom: 15px;
          background: #000;
          border: 1px solid #00ff00;
          color: #00ff00;
          text-align: center;
          font-weight: bold;
        "
      />
      <button
        id="submit-btn"
        style="
          width: 90%;
          padding: 12px;
          background: #00ff00;
          color: #000;
          font-weight: bold;
          cursor: pointer;
        "
      >
        SUBMIT DATA
      </button>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { MindARThree } from "mindar-image-three";

      let savedRoute = localStorage.getItem("bounty_route") || "A";
      const selectedRoute = savedRoute.replace("Route ", "");
      let currentStep = parseInt(localStorage.getItem("bounty_step")) || 0;

      const markerIndexMap = {
        A: 0,
        B: 1,
        C: 2,
        D: 3,
        E: 4,
        G: 5,
        H: 6,
        I: 7,
        J: 8,
        F: 9,
      };

      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const mindarThree = new MindARThree({
            container: document.querySelector("#ar-container"),
            imageTargetSrc: "markers/targets.mind",
          });

          const currentNodeKey = routeSteps[selectedRoute][currentStep];
          const targetIndex = markerIndexMap[currentNodeKey];
          const anchor = mindarThree.addAnchor(targetIndex);

          // MAGIC FIX: The "Off-By-One" Scavenger Hunt Shift
          anchor.onTargetFound = () => {
            let displayRiddle = "";

            if (currentStep < 5) {
              // Fetch the puzzle for the NEXT location
              const nextNodeKey = routeSteps[selectedRoute][currentStep + 1];
              const textKey = "Route " + selectedRoute;

              if (riddles[nextNodeKey] && riddles[nextNodeKey][textKey]) {
                displayRiddle = riddles[nextNodeKey][textKey];
              } else if (
                riddles[nextNodeKey] &&
                riddles[nextNodeKey]["ALL_ROUTES"]
              ) {
                // Catches the Print Shop ALL_ROUTES binary
                displayRiddle = riddles[nextNodeKey]["ALL_ROUTES"];
              } else {
                displayRiddle =
                  "SYSTEM LOG: Proceed to " + riddleAnswers[nextNodeKey];
              }
            } else {
              // If they are at Step 5 (The final Print Shop marker)
              displayRiddle =
                "FINAL CORE REACHED. SECTOR BREACHED. \n\nENTER OVERRIDE KEY TO NEUTRALIZE.";
            }

            document.getElementById("riddle-text").innerText = displayRiddle;
            document.getElementById("riddle-card").style.display = "block";
          };

          await mindarThree.start();
          const { renderer, scene, camera } = mindarThree;
          renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
          });
        } catch (err) {
          console.error("Crash Details:", err);
          alert("CAMERA ERROR: " + err.message);
        }
      });

      // Submit Button Logic
      document.getElementById("submit-btn").addEventListener("click", () => {
        const userInput = document
          .getElementById("node-unlock-code")
          .value.trim()
          .toUpperCase();
        let correctAnswer = "";

        // Check the answer for the NEXT location, or the final override key
        if (currentStep < 5) {
          const nextNodeKey = routeSteps[selectedRoute][currentStep + 1];
          correctAnswer = riddleAnswers[nextNodeKey];
        } else {
          correctAnswer = "DOMINANCE"; // The final keyword for Round 3
        }

        if (userInput === correctAnswer) {
          currentStep++;
          localStorage.setItem("bounty_step", currentStep);

          if (currentStep >= 6) {
            window.location.href = "final.html";
          } else {
            location.reload();
          }
        } else {
          alert("ACCESS DENIED: KEY INCORRECT");
        }
      });
    </script>
  </body>
</html>
