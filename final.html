<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZERO HOUR : Mission Complete</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .final-card {
        background: rgba(0, 15, 20, 0.98) !important;
        border: 2px solid #00e5ff !important;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.3) !important;
      }

      h1 {
        color: #00e5ff !important;
        text-shadow: 0 0 15px #00e5ff !important;
      }

      label {
        color: #00bcd4 !important;
      }

      .warning-text {
        color: #00e5ff !important;
        opacity: 1 !important;
      }

      /* Keep the Winner Screen Gold for contrast */
      .winner-card {
        border: 3px solid #ffd700 !important;
        color: #ffd700 !important;
        box-shadow: 0 0 40px rgba(255, 215, 0, 0.5) !important;
      }
    </style>
  </head>
  <body class="center-screen">
    <div class="scanline"></div>

    <div class="final-card" id="main-card">
      <div class="header-box">
        <h1>TERMINAL ACCESS</h1>
        <p class="subtitle">ROGUE AI CORE SHUTDOWN</p>
      </div>

      <div class="key-input">
        <label>ENCRYPTION KEY 01 (ROUND 1)</label>
        <input id="k1" placeholder="Enter Key 1" oninput="checkKey1()" />
      </div>

      <div class="key-input">
        <label>ENCRYPTION KEY 02 (ROUND 2)</label>
        <input id="k2" placeholder="LOCKED" disabled oninput="checkKey2()" />
      </div>

      <div class="key-input">
        <label>FINAL SHUTDOWN KEY (NODE F)</label>
        <input id="k3" placeholder="LOCKED" disabled />
      </div>

      <button id="final-btn" onclick="verifyFinal()">EXECUTE SHUTDOWN</button>
      <p id="result" class="warning-text">AWAITING AUTHORIZATION...</p>
    </div>

    <div id="winner-screen" class="hidden">
      <div class="final-card winner-card">
        <div class="symbol-decor">◈ ◈ ◈ ◈ ◈</div>

        <span class="bounty-badge">🏆</span>

        <h1 class="gold-text">MISSION ACCOMPLISHED</h1>
        <p class="subtitle" style="color: #ffd700">
          AGENT STATUS: ELITE | RESPECT ++
        </p>

        <div class="token-container">
          <p
            style="
              margin: 0 0 10px 0;
              font-size: 0.7rem;
              letter-spacing: 2px;
              color: #ffd700;
            "
          >
            EXTRACTION TIMESTAMP
          </p>
          <h2
            id="timestamp-display"
            class="gold-text"
            style="font-size: 1.8rem; margin: 0"
          ></h2>
        </div>

        <div
          style="
            margin-top: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            padding-top: 15px;
          "
        >
          <p id="winner-team-info" style="font-size: 1rem; color: #ffd700"></p>
        </div>

        <div class="overseer-call">
          VERIFIED SUCCESS. <br/> SHOW THIS SCREEN TO THE NEAREST EVENT COORDINATOR.
        </div>

        <div class="symbol-decor">◈ ◈ ◈ ◈ ◈</div>
      </div>
    </div>

    <script>
      // These keys correspond to your specific event rounds
      const key1 = "ALPHA";
      const key2 = "OMEGA";
      const key3 = "SHADOW";

      function checkKey1() {
        if (document.getElementById("k1").value.toUpperCase() === key1) {
          const k2 = document.getElementById("k2");
          k2.disabled = false;
          k2.placeholder = "Enter Key 2";
          k2.focus();
          document.getElementById("result").innerText = "KEY 01 ACCEPTED.";
        }
      }

      function checkKey2() {
        if (document.getElementById("k2").value.toUpperCase() === key2) {
          const k3 = document.getElementById("k3");
          k3.disabled = false;
          k3.placeholder = "Enter Final Key";
          k3.focus();
          document.getElementById("result").innerText = "KEY 02 ACCEPTED.";
        }
      }

      function verifyFinal() {
        const val3 = document.getElementById("k3").value.toUpperCase();

        if (val3 === key3) {
          // Capture high-precision completion time
          const now = new Date();
          const timeString =
            now.getHours().toString().padStart(2, "0") +
            ":" +
            now.getMinutes().toString().padStart(2, "0") +
            ":" +
            now.getSeconds().toString().padStart(2, "0") +
            "." +
            now.getMilliseconds().toString().padStart(3, "0");

          const team = localStorage.getItem("bounty_team") || "UNKNOWN";

          // Update UI elements
          document.getElementById("timestamp-display").innerText = timeString;
          document.getElementById("winner-team-info").innerText =
            "AGENT TEAM: " + team;

          document.getElementById("main-card").classList.add("hidden");
          document.getElementById("winner-screen").classList.remove("hidden");

          // Finalize session state
          localStorage.setItem("hunt_status", "winner");
          localStorage.setItem("finish_time", timeString);
        } else {
          document.getElementById("result").innerText =
            "ACCESS DENIED: FINAL AUTHENTICATION FAILED.";
        }
      }
    </script>
  </body>
</html>
