<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <h1>FINAL SHUTDOWN</h1>

    <input id="k1" placeholder="Enter Key 1" />
    <br /><br />

    <input id="k2" placeholder="Enter Key 2" disabled />
    <br /><br />

    <input id="k3" placeholder="Enter Final Key" disabled />

    <br /><br />

    <button onclick="verify()">SUBMIT</button>

    <p id="result"></p>

    <script>
      const key1 = "ALPHA";
      const key2 = "OMEGA";
      const key3 = "SHADOW";

      function verify() {
        let k1 = document.getElementById("k1").value;

        if (k1 === key1) {
          document.getElementById("k2").disabled = false;
        } else {
          alert("Incorrect Key 1");
          return;
        }

        let k2 = document.getElementById("k2").value;

        if (k2 === key2) {
          document.getElementById("k3").disabled = false;
        }

        let k3 = document.getElementById("k3").value;

        if (k3 === key3) {
          document.getElementById("result").innerHTML =
            "ROGUE AI SHUTDOWN COMPLETE. BOUNTY CLAIMED.";
        }
      }
    </script>
  </body>
</html>
