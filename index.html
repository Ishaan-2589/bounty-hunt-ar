<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZERO HOUR : Bounty Hunt</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="center-screen">
    <div class="scanline"></div>

    <div class="start-card">
      <div class="header-box">
        <h1>ZERO HOUR</h1>
        <p class="subtitle">BOUNTY HUNT v1.0</p>
      </div>

      <div class="input-group">
        <label for="team-number">IDENTIFY TEAM NUMBER</label>
        <input
          type="number"
          id="team-number"
          placeholder="01"
          min="1"
          max="5"
        />
      </div>

      <div class="input-group">
        <label for="route-select">ASSIGN DEPLOYMENT ROUTE</label>
        <select id="route-select">
          <option value="Route A">Route A (Sector Alpha)</option>
          <option value="Route B">Route B (Sector Beta)</option>
          <option value="Route C">Route C (Sector Gamma)</option>
          <option value="Route D">Route D (Sector Delta)</option>
          <option value="Route E">Route E (Sector Epsilon)</option>
        </select>
      </div>

      <button id="start-btn">INITIALIZE MISSION</button>

      <p class="warning-text">UNAUTHORIZED ACCESS PROHIBITED</p>
    </div>

    <script>
      document
        .getElementById("start-btn")
        .addEventListener("click", function () {
          const teamNum = document.getElementById("team-number").value;
          const route = document.getElementById("route-select").value;

          if (!teamNum) {
            alert("ERROR: TEAM IDENTIFICATION REQUIRED");
            return;
          }

          // Save mission data
          localStorage.setItem("bounty_team", teamNum);
          localStorage.setItem("bounty_route", route);
          localStorage.setItem("bounty_step", 0); // Start at first node

          window.location.href = "hunt.html";
        });
    </script>
  </body>
</html>
