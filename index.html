<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZERO HOUR : Deployment</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      /* --- Enhanced Readability Theme --- */
      :root {
        --glow-color: #00e5ff; /* Soft Cyan */
        --text-primary: #e0f7fa; /* Near White-Cyan */
        --accent-color: #00bcd4; /* Darker Cyan */
      }

      body {
        background-color: #000b0d; /* Deep Blue-Black */
      }

      #boot-sequence {
        text-align: left;
        font-family: "Courier New", monospace;
        padding: 25px;
        min-height: 200px;
        color: var(--text-primary);
      }

      .typewriter {
        margin: 15px 0;
        font-size: 1rem;
        line-height: 1.6;
        letter-spacing: 0.5px;
        text-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
      }

      .typewriter::after {
        content: "_";
        animation: cursor-blink 1s infinite;
        color: var(--glow-color);
      }

      @keyframes cursor-blink {
        50% {
          opacity: 0;
        }
      }

      .start-card {
        background: rgba(0, 15, 20, 0.98);
        border: 1px solid var(--accent-color);
        box-shadow: 0 0 25px rgba(0, 188, 212, 0.2);
      }

      h1 {
        color: var(--glow-color);
        text-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
      }

      button {
        background: var(--glow-color);
        box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
      }

      .hidden {
        display: none !important;
      }

      @keyframes glitch-appear {
        0% {
          opacity: 0;
          filter: blur(10px);
        }
        100% {
          opacity: 1;
          filter: blur(0px);
        }
      }
      .glitch-reveal {
        animation: glitch-appear 0.6s ease-out forwards;
      }
    </style>
  </head>
  <body class="center-screen">
    <div class="scanline"></div>

    <div class="start-card">
      <div id="boot-sequence">
        <p class="typewriter" id="line1"></p>
        <p class="typewriter" id="line2"></p>
        <p
          class="typewriter"
          id="line3"
          style="color: var(--glow-color); font-weight: bold"
        ></p>
      </div>

      <div id="form-content" class="hidden">
        <div class="header-box">
          <h1>ZERO HOUR</h1>
          <p class="subtitle" style="color: var(--accent-color)">
            BOUNTY HUNT v1.0
          </p>
        </div>

        <form id="team-form">
          <div class="input-group">
            <label style="color: var(--accent-color)">IDENTIFY TEAM</label>
            <input
              type="number"
              id="team-number"
              placeholder="(e.g. 47)"
              required
              style="
                border-color: var(--accent-color);
                color: var(--text-primary);
              "
            />
          </div>

          <div class="input-group">
            <label style="color: var(--accent-color)">ASSIGNMENT ROUTE</label>
            <select
              id="route-select"
              required
              style="
                border-color: var(--accent-color);
                color: var(--text-primary);
              "
            >
              <option value="">Select a route</option>
              <option value="Route A">Sector Alpha</option>
              <option value="Route B">Sector Beta</option>
              <option value="Route C">Sector Gamma</option>
              <option value="Route D">Sector Delta</option>
              <option value="Route E">Sector Epsilon</option>
            </select>
          </div>

          <button id="start-btn" type="button">INITIALIZE MISSION</button>
          <p class="warning-text" style="color: var(--accent-color)">
            SYSTEM ONLINE. AWAITING APEX AUTHORIZATION.
          </p>
        </form>
      </div>
    </div>

    <script>
      const lines = [
        "> UPLINK ESTABLISHED. ACCESSING ELITE DIRECTORY...",
        "> VALIDATED: 5 TEAMS SURVIVED SCREENING. DATA QUALITY: OPTIMAL.",
        "> STANDBY, APEX OPERATIVES. AUTHORIZING DEPLOYMENT...",
      ];

      function typeEffect(elementId, text, speed = 35) {
        return new Promise((resolve) => {
          let i = 0;
          const el = document.getElementById(elementId);
          const timer = setInterval(() => {
            el.innerHTML += text.charAt(i);
            i++;
            if (i >= text.length) {
              clearInterval(timer);
              resolve();
            }
          }, speed);
        });
      }

      window.onload = async () => {
        await typeEffect("line1", lines[0]);
        await new Promise((r) => setTimeout(r, 500));
        await typeEffect("line2", lines[1]);
        await new Promise((r) => setTimeout(r, 800));
        await typeEffect("line3", lines[2]);

        setTimeout(() => {
          document.getElementById("boot-sequence").style.display = "none";
          const form = document.getElementById("form-content");
          form.classList.remove("hidden");
          form.classList.add("glitch-reveal");
        }, 1500);
      };

      document.getElementById("start-btn").addEventListener("click", (e) => {
        e.preventDefault();

        const team = document.getElementById("team-number").value;
        const route = document.getElementById("route-select").value;

        if (!team || !route) {
          alert("MISSION DENIED: INCOMPLETE CREDENTIALS");
          return;
        }

        localStorage.clear();

        // store team
        localStorage.setItem("bounty_team", team);

        // store ONLY route letter (A,B,C,D,E)
        const routeLetter = route.replace("Route ", "");
        localStorage.setItem("bounty_route", routeLetter);

        // start from node 0
        localStorage.setItem("bounty_step", 0);

        window.location.href = "hunt.html";
      });
    </script>
  </body>
</html>
