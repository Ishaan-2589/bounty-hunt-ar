<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RECONNAISSANCE UNIT</title>

    <link rel="stylesheet" href="css/style.css" />
    <script src="js/riddles.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
  </head>
  <body>
    <div id="scanner-container">
      <div id="progress-container">
        <div id="progress-bar"></div>
        <div id="progress-text">NODE 1/6</div>
      </div>

      <div id="riddle-card">
        <p id="riddle-text">INITIALIZING...</p>
        <input
          type="text"
          id="node-unlock-code"
          placeholder="ENTER ACCESS KEY"
        />
        <button onclick="unlockNextNode()">SUBMIT DATA</button>
      </div>
    </div>

    <script>
      let savedRoute = localStorage.getItem("bounty_route") || "A";
      const selectedRoute = savedRoute.replace("Route ", ""); // Fixes the crash
      let currentStep = parseInt(localStorage.getItem("bounty_step")) || 0;

      const markerIndexMap = {
        A: 0,
        B: 1,
        C: 2,
        D: 3,
        E: 4,
        G: 5,
        H: 6,
        I: 7,
        J: 8,
        F: 9,
      };

      // Exactly how your scanner.js originally worked
      document.addEventListener("DOMContentLoaded", async () => {
        const mindarThree = new window.MINDAR.IMAGE.MindARThree({
          container: document.body,
          imageTargetSrc: "markers/targets.mind",
        });

        // Set the target for the current team's route
        const currentNodeKey = routeSteps[selectedRoute][currentStep];
        const targetIndex = markerIndexMap[currentNodeKey];
        mindarThree.addAnchor(targetIndex);

        try {
          await mindarThree.start();
          const { renderer, scene, camera } = mindarThree;
          renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
          });

          // Load the riddle text onto the screen
          updateUI();
        } catch (err) {
          console.error("Camera Error:", err);
          alert("Camera access denied or failed to load. Please refresh.");
        }
      });

      function updateUI() {
        const totalNodes = 6;
        const progress = (currentStep / totalNodes) * 100;
        document.getElementById("progress-bar").style.width = progress + "%";

        const displayStep = Math.min(currentStep + 1, totalNodes);
        document.getElementById("progress-text").innerText =
          `NODE ${displayStep}/${totalNodes}`;

        const currentNodeKey = routeSteps[selectedRoute][currentStep];
        const textKey = "Route " + selectedRoute;

        if (riddles[currentNodeKey] && riddles[currentNodeKey][textKey]) {
          document.getElementById("riddle-text").innerText =
            riddles[currentNodeKey][textKey];
        } else {
          document.getElementById("riddle-text").innerText =
            "SYSTEM LOG: Proceed to next node.";
        }
      }

      function unlockNextNode() {
        const userInput = document
          .getElementById("node-unlock-code")
          .value.trim()
          .toUpperCase();
        const currentNodeKey = routeSteps[selectedRoute][currentStep];
        const correctAnswer = riddleAnswers[currentNodeKey];

        if (userInput === correctAnswer) {
          currentStep++;
          localStorage.setItem("bounty_step", currentStep);

          if (currentStep >= 6) {
            window.location.href = "final.html"; // Go straight to final page
          } else {
            location.reload(); // Reload to scan the next target
          }
        } else {
          alert("ACCESS DENIED: KEY INCORRECT");
        }
      }
    </script>
  </body>
</html>
