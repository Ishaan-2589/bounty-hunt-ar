<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZERO HOUR : Deployment</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="center-screen">
    <div class="scanline"></div>
    <div class="start-card">
      <div class="header-box">
        <h1>ZERO HOUR</h1>
        <p class="subtitle">BOUNTY HUNT v1.0</p>
      </div>
<form id="team-form">
      <div class="input-group">
        <label>IDENTIFY TEAM</label>
        <input type="number" id="team-number" placeholder="(e.g. 47)" required />
      </div>

      <div class="input-group">
        <label>ASSIGNMENT ROUTE</label>
        <select id="route-select" required>
          <option value="">Select a route</option>
          <option value="Route A">Sector Alpha</option>
          <option value="Route B">Sector Beta</option>
          <option value="Route C">Sector Gamma</option>
          <option value="Route D">Sector Delta</option>
          <option value="Route E">Sector Epsilon</option>
        </select>
      </div>

      <button id="start-btn">INITIALIZE MISSION</button>
      <p class="warning-text">SYSTEM READY. AWAITING INPUT.</p>
    </div></form>

   <script>
    // We target the form itself to handle both button clicks and "Enter" key presses
    document.getElementById("start-btn").addEventListener("click", (e) => {
        // 1. Prevent the form from refreshing the page
        e.preventDefault(); 
        
        console.log("Button Clicked...");

        const team = document.getElementById("team-number").value;
        const route = document.getElementById("route-select").value;

        // 2. Validation Check
        if (!team || team.trim() === "") { 
            alert("ERROR: TEAM IDENTIFICATION REQUIRED"); 
            return; 
        }
        if (route === "") {
            alert("ERROR: ROUTE ASSIGNMENT REQUIRED");
            return;
        }

        console.log("Saving data for Team:", team, "on", route);

        try {
            // 3. Clear old "Rogue AI" data
            localStorage.clear();

            // 4. Save new mission data
            localStorage.setItem("bounty_team", team);
            localStorage.setItem("bounty_route", route);
            localStorage.setItem("bounty_step", 0);

            console.log("Redirecting to hunt.html...");
            
            // 5. Perform the redirect
            window.location.href = "hunt.html";
        } catch (err) {
            console.error("LocalStorage Error:", err);
            alert("Browser storage error. Disable private mode.");
        }
    });
</script>
  </body>
</html>
